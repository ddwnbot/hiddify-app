name: Release
on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: false
        default: 'dev'
      tag:
        description: 'Tag name (optional)'
        required: false
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    permissions: write-all
    with:
      upload-artifact: true
      tag-name: "${{ inputs.tag || github.ref_name }}"
      channel: "${{ inputs.channel || (github.ref_type == 'tag' && endsWith(github.ref_name, 'dev') && 'dev' || github.ref_type != 'tag' && 'dev' || 'prod') }}"
